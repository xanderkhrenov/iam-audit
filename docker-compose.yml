services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: iam_audit
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  kafka:
    image: apache/kafka:latest
    ports:
      - "${KAFKA_HOST_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9094}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      - kafka
    entrypoint:
      - /bin/sh
      - -ec
      - |
        for i in $$(seq 1 30); do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists --topic iam.audit.events \
            --partitions 1 --replication-factor 1 && exit 0;
          sleep 2;
        done;
        exit 1

  schema-registry:
    image: quay.io/apicurio/apicurio-registry-mem:2.6.13.Final
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8080"

  schema-registry-init:
    image: curlimages/curl:8.11.1
    depends_on:
      - schema-registry
    volumes:
      - ./api/proto/iam/audit/v1:/schemas:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        for i in $$(seq 1 30); do
          curl -fsS -X POST \
            -H "Content-Type: application/x-protobuf" \
            -H "X-Registry-ArtifactId: iam.access.lifecycle" \
            --data-binary @/schemas/access_lifecycle.proto \
            "http://schema-registry:8080/apis/registry/v2/groups/iam-audit/artifacts" && exit 0;
          curl -fsS \
            "http://schema-registry:8080/apis/registry/v2/groups/iam-audit/artifacts/iam.access.lifecycle/versions/1" && exit 0;
          sleep 2;
        done;
        exit 1

  iam-audit:
    build: .
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_started
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: iam_audit
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: iam.audit.events
      KAFKA_GROUP_ID: iam-audit-service
      SCHEMA_REGISTRY_URL: http://schema-registry:8080
      SCHEMA_REGISTRY_GROUP_ID: iam-audit
      SCHEMA_REGISTRY_STRICT: "true"

  kafka-simulator:
    build: .
    profiles: ["tools"]
    depends_on:
      - kafka
    entrypoint: ["/app/iam-audit-simulator"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: iam.audit.events

volumes:
  clickhouse-data:
  kafka-data:
